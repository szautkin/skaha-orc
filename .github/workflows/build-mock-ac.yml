name: Build mock-ac
on:
  push:
    branches: [main]
    paths: ['charts/mock-ac/app/**']
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: charts/mock-ac/app
          push: true
          tags: |
            ghcr.io/szautkin/skaha-orc/mock-ac:latest
            ghcr.io/szautkin/skaha-orc/mock-ac:${{ github.sha }}
