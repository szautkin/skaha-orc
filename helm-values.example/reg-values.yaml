# IVOA Registry — example values
# Hostnames are auto-configured by: npm run setup
# The bootstrap auto-registers GMS (mock-ac) if not already present.

global:
  hostname: haproxy.cadc.dao.nrc.ca
application:
  authority: ivo://cadc.nrc.ca/reg
  serviceEntries:
    - id: ivo://cadc.nrc.ca/posix-mapper
      url: https://haproxy.cadc.dao.nrc.ca/posix-mapper/capabilities
    - id: ivo://cadc.nrc.ca/skaha
      url: https://haproxy.cadc.dao.nrc.ca/skaha/capabilities
    - id: ivo://cadc.nrc.ca/cavern
      url: https://haproxy.cadc.dao.nrc.ca/cavern/capabilities
ingress:
  enabled: true
  className: base-traefik
  hosts:
    - host: haproxy.cadc.dao.nrc.ca
      paths:
        - path: /reg
          pathType: Prefix
service:
  type: ClusterIP
  port: 8080
