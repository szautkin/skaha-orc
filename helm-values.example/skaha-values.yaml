# Skaha — example values
# Hostnames and secrets are auto-configured by: npm run setup

deployment:
  hostname: haproxy.cadc.dao.nrc.ca
  extraHosts:
    - ip: "10.0.0.1"
      hostname: haproxy.cadc.dao.nrc.ca

skaha:
  registryURL: images.opencadc.org
  oidc:
    uri: https://haproxy.cadc.dao.nrc.ca/dex
    clientID: science-portal
    clientSecret: CHANGE_ME
    callbackURI: https://haproxy.cadc.dao.nrc.ca/skaha/oidc-callback
    redirectURI: https://haproxy.cadc.dao.nrc.ca/skaha
    scope: openid profile

secrets:
  skaha-tls-secret:
    tls-cert.pem: ""
    tls-key.pem: ""
