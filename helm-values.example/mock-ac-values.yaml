# Mock Access Control — example values
# Provides GMS (Group Management Service) for local dev.
# Hostnames are auto-configured by: npm run setup

replicaCount: 1

image:
  repository: mock-ac
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

config:
  resourceID: "ivo://cadc.nrc.ca/gms"
  baseURL: "https://haproxy.cadc.dao.nrc.ca/ac"

resources:
  requests:
    memory: "64Mi"
    cpu: "50m"
  limits:
    memory: "128Mi"
    cpu: "200m"

ingress:
  enabled: true
  path: /ac
