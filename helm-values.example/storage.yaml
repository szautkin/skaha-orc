# Storage UI — example values
# Hostnames and secrets are auto-configured by: npm run setup
# Bootstrap auto-syncs: gmsID, CA cert, feature flags

deployment:
  hostname: haproxy.cadc.dao.nrc.ca
  storageUI:
    registryURL: https://haproxy.cadc.dao.nrc.ca/reg
    themeName: src
    oidc:
      uri: https://haproxy.cadc.dao.nrc.ca/dex
      clientID: storage-ui
      clientSecret: CHANGE_ME
      callbackURI: https://haproxy.cadc.dao.nrc.ca/storage/
      redirectURI: https://haproxy.cadc.dao.nrc.ca/storage/oidc-callback
      scope: openid profile offline_access
    backend:
      defaultService: cavern
      services:
        cavern:
          resourceID: ivo://cadc.nrc.ca/cavern
          nodeURIPrefix: vos://cadc.nrc.ca~cavern
          userHomeDir: /home
          # Feature flags for org.opencadc.vosui.properties — all enabled by default.
          # Bootstrap auto-sets these if missing. The chart template reads from
          # backend.services.<name>.features.<flag> to render the properties file.
          features:
            batchDownload: true
            batchUpload: true
            externalLinks: true
            paging: true
            directDownload: true
  extraHosts:
    - ip: "10.0.0.1"
      hostname: haproxy.cadc.dao.nrc.ca
