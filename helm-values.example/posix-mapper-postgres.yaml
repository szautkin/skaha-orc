# POSIX Mapper PostgreSQL — example values
# Passwords are auto-generated by: npm run setup

deployment:
  extraHosts:
    - ip: "10.0.0.1"
      hostname: haproxy.cadc.dao.nrc.ca

postgres:
  image: postgres:14
  auth:
    username: posixmapper
    password: CHANGE_ME
    database: posixmapper
    schema: mapping
  storage:
    spec:
      accessModes: [ReadWriteOnce]
      resources:
        requests:
          storage: 1Gi
  # Seed users inserted on fresh DB init. UIDs must match mock-ac users
  # and filesystem ownership. Without this, auto-assigned UIDs mismatch.
  # Bootstrap also creates a personal group per user (GID = UID) to fix
  # the posix-mapper bug where passwd has GID but no group record exists,
  # causing "groups: cannot find name for group ID <uid>" in notebooks.
  seed:
    users:
      - username: admin
        uid: 10000
