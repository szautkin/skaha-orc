apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: doi-ingress
  namespace: {{ .Values.skaha.namespace }}
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  rules:
  - host: {{ .Values.deployment.hostname }}
    http:
      paths:
      - path: /doi
        pathType: Prefix
        backend:
          service:
            name: doi-tomcat
            port:
              number: 80
