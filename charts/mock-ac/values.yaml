# Mock AC service configuration

replicaCount: 1

image:
  repository: ghcr.io/szautkin/skaha-orc/mock-ac
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

# AC service configuration
config:
  resourceID: "ivo://cadc.nrc.ca/gms"
  baseURL: "http://mock-ac.skaha-system.svc.cluster.local/ac"

# Mock users — passed as MOCK_AC_USERS env var (JSON).
# Keys are usernames. Override these to add your own users.
# Set to empty {} to use built-in defaults from the app.
users:
  admin:
    userID: admin
    identityType: HTTP
    firstName: Platform
    lastName: Admin
    email: admin@haproxy.cadc.dao.nrc.ca
    x500: "CN=admin_mock,OU=CADC,O=HIA,C=CA"
    posixDetails:
      uid: 10000
      gid: 10000
      homeDirectory: /home/10000
  doiadmin:
    userID: doiadmin
    identityType: X509
    firstName: DOI
    lastName: Administrator
    email: doiadmin@cadc.nrc.ca
    x500: "CN=doiadmin_mock,OU=CADC,O=HIA,C=CA"
    posixDetails:
      uid: 10001
      gid: 10001
      homeDirectory: /home/10001
  testuser:
    userID: testuser
    identityType: HTTP
    firstName: Test
    lastName: User
    email: testuser@cadc.nrc.ca
    x500: "CN=testuser_mock,OU=CADC,O=HIA,C=CA"
    posixDetails:
      uid: 10002
      gid: 10002
      homeDirectory: /home/10002

# Mock groups — passed as MOCK_AC_GROUPS env var (JSON).
# Keys are group IDs. Skaha requires users to be in skaha-users group.
groups:
  skaha-users:
    groupID: skaha-users
    ownerID: admin
    description: Skaha Science Platform Users
    userMembers: [admin, doiadmin, testuser]
    groupMembers: []
  skaha-admins:
    groupID: skaha-admins
    ownerID: admin
    description: Skaha Science Platform Administrators
    userMembers: [admin, doiadmin]
    groupMembers: []
  skaha-headless:
    groupID: skaha-headless
    ownerID: admin
    description: Skaha Headless Session Users
    userMembers: [admin]
    groupMembers: []
  platform-users:
    groupID: platform-users
    ownerID: admin
    description: Science Platform Users
    userMembers: [admin, doiadmin, testuser]
    groupMembers: []

resources:
  requests:
    memory: "64Mi"
    cpu: "50m"
  limits:
    memory: "128Mi"
    cpu: "200m"

# For routing via ingress
ingress:
  enabled: true
  path: /ac
